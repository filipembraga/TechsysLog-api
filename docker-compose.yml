services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - techsyslog-net

  api:
    build:
      context: .
      dockerfile: TechsysLog.API/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - MongoDb__ConnectionString=mongodb://mongo:27017
      - MongoDb__DatabaseName=techsyslog
      - Jwt__Secret=${JWT_SECRET}
    depends_on:
      - mongo
    networks:
      - techsyslog-net

  frontend:
    build:
      context: ../TechsysLog-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - techsyslog-net

volumes:
  mongo-data:

networks:
  techsyslog-net:
